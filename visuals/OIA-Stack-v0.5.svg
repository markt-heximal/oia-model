  <text x="44" y="1020" font-family="'Helvetica Neue',Arial,'Liberation Sans',sans-serif" font-size="11" fill="#33415c">Bottom-up numbering (OSI convention). Layer 0 is the physical substrate beneath the architectural stack. Additive to OSI, NIST, MITRE, OWASP, CCC, ISO/IEC 42001.</text>
